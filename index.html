<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pivot Champs</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="bul-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-overlay">
            <div id="hud" class="hidden">
                <div id="xp-bar-container">
                    <div id="xp-bar"></div>
                </div>
                <div id="hp-bar-container">
                    <div id="hp-bar"></div>
                </div>
                <div id="stats">
                    <span id="level-display">Level: 1</span>
                    <span id="time-display">00:00</span>
                    <span id="kill-display">Kills: 0</span>
                </div>
            </div>

            <div id="start-screen" class="screen">
                <h1>PIVOT SURVIVORS</h1>
                <div id="difficulty-selection">
                    <h2>SELECT DIFFICULTY</h2>
                    <div class="difficulty-buttons">
                        <button class="difficulty-button" data-difficulty="EASY">
                            <span class="difficulty-name">Easy</span>
                            <span class="difficulty-desc">For players new to the game</span>
                        </button>
                        <button class="difficulty-button selected" data-difficulty="NORMAL">
                            <span class="difficulty-name">Normal</span>
                            <span class="difficulty-desc">Balanced challenge</span>
                        </button>
                        <button class="difficulty-button" data-difficulty="HARD">
                            <span class="difficulty-name">Hard</span>
                            <span class="difficulty-desc">For experienced survivors</span>
                        </button>
                    </div>
                </div>
                <button id="start-button">START GAME</button>
            </div>

            <div id="levelup-screen" class="screen hidden">
                <h2>LEVEL UP!</h2>
                <div id="upgrade-options"></div>
            </div>

            <div id="gameover-screen" class="screen hidden">
                <h1>GAME OVER</h1>
                <div id="final-stats"></div>
                <button id="restart-button">RESTART</button>
            </div>

            <div id="pause-screen" class="screen hidden">
                <h1>PAUSED</h1>
                <button id="resume-button">RESUME</button>
                <button id="restart-pause-button">RESTART</button>
            </div>
        </div>
    </div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
