<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background: #1a1a2e; font-family: system-ui, sans-serif;
        }
        .calculator {
            background: #16213e; border-radius: 16px; padding: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4); width: 320px;
        }
        .display {
            background: #0f3460; border-radius: 12px; padding: 16px 20px;
            margin-bottom: 20px; text-align: right; min-height: 80px;
            display: flex; flex-direction: column; justify-content: flex-end;
        }
        .expression { color: #8899aa; font-size: 14px; min-height: 20px; }
        .current { color: #e6e6e6; font-size: 32px; font-weight: 600; word-break: break-all; }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button {
            padding: 18px; font-size: 20px; border: none; border-radius: 10px;
            cursor: pointer; transition: background 0.15s, transform 0.1s;
            font-weight: 500;
        }
        button:active { transform: scale(0.95); }
        .btn-num { background: #1a1a3e; color: #e6e6e6; }
        .btn-num:hover { background: #2a2a5e; }
        .btn-op { background: #e94560; color: #fff; }
        .btn-op:hover { background: #ff6b81; }
        .btn-func { background: #533483; color: #e6e6e6; }
        .btn-func:hover { background: #6b44a0; }
        .btn-eq { background: #0f3460; color: #fff; }
        .btn-eq:hover { background: #1a5090; }
        .span-2 { grid-column: span 2; }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="expression" id="expression"></div>
            <div class="current" id="display">0</div>
        </div>
        <div class="buttons">
            <button class="btn-func" data-action="clear">AC</button>
            <button class="btn-func" data-action="toggle-sign">+/−</button>
            <button class="btn-func" data-action="percent">%</button>
            <button class="btn-op" data-action="op" data-value="/">÷</button>

            <button class="btn-num" data-value="7">7</button>
            <button class="btn-num" data-value="8">8</button>
            <button class="btn-num" data-value="9">9</button>
            <button class="btn-op" data-action="op" data-value="*">×</button>

            <button class="btn-num" data-value="4">4</button>
            <button class="btn-num" data-value="5">5</button>
            <button class="btn-num" data-value="6">6</button>
            <button class="btn-op" data-action="op" data-value="-">−</button>

            <button class="btn-num" data-value="1">1</button>
            <button class="btn-num" data-value="2">2</button>
            <button class="btn-num" data-value="3">3</button>
            <button class="btn-op" data-action="op" data-value="+">+</button>

            <button class="btn-num span-2" data-value="0">0</button>
            <button class="btn-num" data-value=".">.</button>
            <button class="btn-eq" data-action="equals">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');
        const expression = document.getElementById('expression');

        let current = '0';
        let previous = null;
        let operator = null;
        let resetNext = false;

        function updateDisplay() {
            display.textContent = current;
        }

        function calculate(a, op, b) {
            a = parseFloat(a);
            b = parseFloat(b);
            switch (op) {
                case '+': return a + b;
                case '-': return a - b;
                case '*': return a * b;
                case '/': return b === 0 ? 'Error' : a / b;
            }
        }

        function formatNumber(n) {
            if (typeof n === 'string') return n;
            const str = parseFloat(n.toPrecision(12)).toString();
            return str.length > 14 ? parseFloat(n).toExponential(6) : str;
        }

        const opSymbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };

        document.querySelector('.buttons').addEventListener('click', (e) => {
            const btn = e.target.closest('button');
            if (!btn) return;

            const action = btn.dataset.action;
            const value = btn.dataset.value;

            if (!action) {
                // Number or decimal input
                if (resetNext) { current = '0'; resetNext = false; }
                if (value === '.') {
                    if (current.includes('.')) return;
                    current += '.';
                } else {
                    current = current === '0' ? value : current + value;
                }
                if (current.length > 14) return;
                updateDisplay();
                return;
            }

            switch (action) {
                case 'clear':
                    current = '0'; previous = null; operator = null;
                    expression.textContent = '';
                    updateDisplay();
                    break;
                case 'toggle-sign':
                    if (current !== '0') {
                        current = current.startsWith('-') ? current.slice(1) : '-' + current;
                        updateDisplay();
                    }
                    break;
                case 'percent':
                    current = formatNumber(parseFloat(current) / 100);
                    updateDisplay();
                    break;
                case 'op':
                    if (previous !== null && operator && !resetNext) {
                        const result = calculate(previous, operator, current);
                        current = formatNumber(result);
                        updateDisplay();
                    }
                    previous = current;
                    operator = value;
                    expression.textContent = `${previous} ${opSymbols[value]}`;
                    resetNext = true;
                    break;
                case 'equals':
                    if (previous !== null && operator) {
                        expression.textContent = `${previous} ${opSymbols[operator]} ${current} =`;
                        const result = calculate(previous, operator, current);
                        current = formatNumber(result);
                        previous = null;
                        operator = null;
                        resetNext = true;
                        updateDisplay();
                    }
                    break;
            }
        });

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            const key = e.key;
            if (key >= '0' && key <= '9' || key === '.') {
                document.querySelector(`button[data-value="${key}"]`)?.click();
            } else if (['+', '-', '*', '/'].includes(key)) {
                document.querySelector(`button[data-action="op"][data-value="${key}"]`)?.click();
            } else if (key === 'Enter' || key === '=') {
                document.querySelector('[data-action="equals"]')?.click();
            } else if (key === 'Escape') {
                document.querySelector('[data-action="clear"]')?.click();
            } else if (key === 'Backspace') {
                if (current.length > 1) {
                    current = current.slice(0, -1);
                } else {
                    current = '0';
                }
                updateDisplay();
            }
        });
    </script>
</body>
</html>
